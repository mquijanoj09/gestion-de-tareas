# Rollback Workflow - Manual Panic Button
# This workflow allows manual rollback to a previous version

name: 🔴 Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
          - both
      target_version:
        description: 'Version to rollback to (Git tag or SHA)'
        required: true
        type: string
      reason:
        description: 'Reason for rollback'
        required: false
        type: string

concurrency:
  group: rollback-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TF_VERSION: '~1.6'

jobs:
  # -------------------------------------
  # Validate inputs
  # -------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.validate.outputs.image_tag }}
    steps:
      - name: Validate version exists
        id: validate
        env:
          TARGET_VERSION: ${{ github.event.inputs.target_version }}
        run: |
          # Check if it's a valid tag or SHA
          if [[ "$TARGET_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Rolling back to tag: $TARGET_VERSION"
            echo "image_tag=$TARGET_VERSION" >> $GITHUB_OUTPUT
          elif [[ "$TARGET_VERSION" =~ ^[a-f0-9]{40}$ ]]; then
            echo "Rolling back to commit SHA: $TARGET_VERSION"
            # Use SHA directly without sha- prefix for valid Docker image tag
            echo "image_tag=$TARGET_VERSION" >> $GITHUB_OUTPUT
          elif [[ "$TARGET_VERSION" == "previous" ]]; then
            # Get the previous successful semantic version deployment from tags
            # Filter to only get v*.*.* tags (semantic versions)
            TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' HEAD^ 2>/dev/null || echo "")
            if [ -z "$TAG" ]; then
              # Fallback to latest tag or latest image
              TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "latest")
            fi
            echo "Rolling back to previous version: $TAG"
            echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          elif [[ "$TARGET_VERSION" == "latest" ]]; then
            echo "image_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "$TARGET_VERSION" =~ ^sha-[a-f0-9]{40}$ ]]; then
            # Handle sha- prefix format (strip sha- to get valid Docker image tag)
            SHA_ONLY="${TARGET_VERSION#sha-}"
            echo "Rolling back to commit SHA: $SHA_ONLY"
            echo "image_tag=$SHA_ONLY" >> $GITHUB_OUTPUT
          else
            echo "Using custom version: $TARGET_VERSION"
            echo "image_tag=$TARGET_VERSION" >> $GITHUB_OUTPUT
          fi

  # -------------------------------------
  # Rollback Staging
  # -------------------------------------
  rollback-staging:
    needs: validate
    if: github.event.inputs.environment == 'staging' || github.event.inputs.environment == 'both'
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.current.outputs.cluster_name }}
      service_name: ${{ steps.current.outputs.service_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (staging)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Get current infrastructure
        id: current
        working-directory: infra/ecs
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "cluster_name=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}" >> $GITHUB_OUTPUT
          echo "::notice::Cluster: ${CLUSTER}, Service: ${SERVICE}"

      - name: Rollback Staging with previous image
        working-directory: infra/ecs
        env:
          IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
          TF_VAR_environment_name: staging
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${IMAGE_TAG}"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${IMAGE_TAG}"

          echo "🔄 Rolling back STAGING to: $IMAGE_TAG"
          echo "Backend image: $BACKEND_URI"
          echo "Frontend image: $FRONTEND_URI"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Force new deployment ECS staging
        run: |
          CLUSTER_NAME="${{ needs.rollback-staging.outputs.cluster_name }}"
          SERVICE_NAME="${{ needs.rollback-staging.outputs.service_name }}"

          echo "Cluster: $CLUSTER_NAME"
          echo "Service: $SERVICE_NAME"

          if [ -z "$CLUSTER_NAME" ] || [ -z "$SERVICE_NAME" ]; then
            echo "::error::Missing cluster or service name"
            exit 1
          fi

          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --region ${{ env.AWS_REGION }}

      - name: Verify rollback
        run: |
          echo "✅ Staging rollback completed to version: ${{ needs.validate.outputs.image_tag }}"
          echo "📝 Reason: ${{ github.event.inputs.reason || 'Not provided' }}"

  # -------------------------------------
  # Rollback Production
  # -------------------------------------
  rollback-production:
    needs: validate
    if: github.event.inputs.environment == 'production' || github.event.inputs.environment == 'both'
    runs-on: ubuntu-latest
    outputs:
      cluster_name: ${{ steps.current.outputs.cluster_name }}
      service_name: ${{ steps.current.outputs.service_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (production)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Get current infrastructure
        id: current
        working-directory: infra/ecs
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "cluster_name=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}" >> $GITHUB_OUTPUT
          echo "::notice::Cluster: ${CLUSTER}, Service: ${SERVICE}"

      - name: Rollback Production with previous image
        working-directory: infra/ecs
        env:
          IMAGE_TAG: ${{ needs.validate.outputs.image_tag }}
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${IMAGE_TAG}"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${IMAGE_TAG}"

          echo "🔄 Rolling back PRODUCTION to: $IMAGE_TAG"
          echo "Backend image: $BACKEND_URI"
          echo "Frontend image: $FRONTEND_URI"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Force new deployment ECS production
        run: |
          CLUSTER_NAME="${{ needs.rollback-production.outputs.cluster_name }}"
          SERVICE_NAME="${{ needs.rollback-production.outputs.service_name }}"

          echo "Cluster: $CLUSTER_NAME"
          echo "Service: $SERVICE_NAME"

          if [ -z "$CLUSTER_NAME" ] || [ -z "$SERVICE_NAME" ]; then
            echo "::error::Missing cluster or service name"
            exit 1
          fi

          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME" \
            --region ${{ env.AWS_REGION }}

      - name: Verify rollback
        run: |
          echo "✅ Production rollback completed to version: ${{ needs.validate.outputs.image_tag }}"
          echo "📝 Reason: ${{ github.event.inputs.reason || 'Not provided' }}"

  # -------------------------------------
  # Summary
  # -------------------------------------
  summary:
    needs: [rollback-staging, rollback-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create rollback summary
        run: |
          echo "## 🔴 Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target Version:** ${{ github.event.inputs.target_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ github.event.inputs.reason || 'Not provided' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          STAGING_STATUS="${{ needs.rollback-staging.result }}"
          PROD_STATUS="${{ needs.rollback-production.result }}"

          echo "### Rollback Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.rollback-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.rollback-production.result }} |" >> $GITHUB_STEP_SUMMARY
