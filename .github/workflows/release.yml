# Release Workflow - Auto-tagging on merge to main
# Creates semantic version tags when code is merged to main

name: 📦 Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # -------------------------------------
  # Determine version bump
  # -------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: version
        run: |
          # Get latest tag if exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"

          # Extract version type from input or conventional commits
          VERSION_TYPE="${{ github.event.inputs.version_type }}"

          if [ -z "$VERSION_TYPE" ]; then
            # Analyze commits to determine version bump
            COMMITS=$(git log --format=%s main..HEAD 2>/dev/null || git log --format=%s HEAD~10..HEAD)
            
            if echo "$COMMITS" | grep -qiE '^(feat|break|chore|fix|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?:'; then
              # Check for breaking changes or major features
              if echo "$COMMITS" | grep -qi 'BREAKING CHANGE\|breaking change'; then
                VERSION_TYPE="major"
              elif echo "$COMMITS" | grep -qi '^feat'; then
                VERSION_TYPE="minor"
              else
                VERSION_TYPE="patch"
              fi
            else
              VERSION_TYPE="patch"
            fi
          fi

          echo "Version bump: $VERSION_TYPE"

          # Calculate new version
          TAG="$LATEST_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG="v0.0.0"
          fi

          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "$VERSION_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --format=- %s main..HEAD 2>/dev/null | head -20 || echo "No changes detected")
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Create Git Tag and GitHub Release
  # -------------------------------------
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Git Tag
        run: |
          VERSION="${{ needs.prepare.outputs.new_version }}"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
          echo "Created tag: $VERSION"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare.outputs.new_version }}
          release_name: Release ${{ needs.prepare.outputs.new_version }}
          body: |
            ## Changes in this release

            ${{ needs.prepare.outputs.changelog }}

            ### Deployment

            This version is ready for deployment to staging/production.
          draft: false
          prerelease: false

  # -------------------------------------
  # Build and push Docker images with version tag
  # -------------------------------------
  build-and-push:
    needs: [prepare, create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${{ needs.prepare.outputs.new_version }}
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${{ needs.prepare.outputs.new_version }}
            ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------
  # Notify that release is ready for deployment
  # -------------------------------------
  notify:
    needs: [prepare, create-release, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment summary
        run: |
          echo "## 🚀 Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.prepare.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker images have been pushed:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${{ needs.prepare.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${{ needs.prepare.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "You can now deploy to staging or production using the rollback workflow with version: \`${{ needs.prepare.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
