name: CI Backend

on:
  push:
    branches:
      - main
      - 'feat/**'
      - develop
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/cd-staging.yml'
      - '.github/workflows/cd-production.yml'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/ci-backend.yml'
      - '.github/workflows/cd-staging.yml'
      - '.github/workflows/cd-production.yml'
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gestion_de_tareas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gestion_de_tareas_test?schema=public
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace shared

      - name: Write .env for dotenv-cli
        run: echo "DATABASE_URL=$DATABASE_URL" > .env

      - name: Generate Prisma client
        run: npm run prisma:generate --workspace backend

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy --schema backend/prisma/schema.prisma

      - name: Lint (ESLint)
        run: npm run lint --workspace backend

      - name: Typecheck
        run: npm run typecheck --workspace backend

      - name: Unit tests (Jest + supertest)
        run: npm run test:coverage --workspace backend

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

      # --- Docker ---

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
