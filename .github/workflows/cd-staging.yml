name: CD Staging AWS ECS con Terraform

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: cd-staging-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '~1.6'

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Resolve image tag (commit SHA)
        id: tag
        run: |
          echo "image_tag=sha-${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "Deploying commit: ${{ github.sha }}"

      - name: Ensure both CI workflows succeeded for this SHA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          check_wf() {
            gh api "repos/${REPO}/actions/workflows/$1/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "missing"'
          }
          for i in $(seq 1 30); do
            B=$(check_wf ci-backend.yml)
            F=$(check_wf ci-frontend.yml)
            echo "attempt=$i backend=$B frontend=$F"
            if [ "$B" = "success" ] && [ "$F" = "success" ]; then
              echo "proceed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            if [ "$B" = "failure" ] || [ "$F" = "failure" ]; then
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 20
          done
          echo "proceed=false" >> $GITHUB_OUTPUT

  deploy-tf-staging:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      alb_url_staging: ${{ steps.tf_out.outputs.alb_url }}
      cluster_name_staging: ${{ steps.tf_out.outputs.cluster_name }}
      service_name_staging: ${{ steps.tf_out.outputs.service_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform State Bucket
        run: |
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "Error: define la variable TF_STATE_BUCKET"; exit 1
          fi
          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
            echo "Bucket ya existe"
          else
            aws s3api create-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" --region ${{ env.AWS_REGION }}
          fi
          aws s3api put-bucket-versioning \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (staging)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (staging)
        working-directory: infra/ecs
        env:
          IMAGE_TAG: ${{ needs.gate.outputs.image_tag }}
          TF_VAR_environment_name: staging
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${IMAGE_TAG}"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${IMAGE_TAG}"
          echo "Backend image: $BACKEND_URI"
          echo "Frontend image: $FRONTEND_URI"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Get Terraform Outputs (staging)
        id: tf_out
        working-directory: infra/ecs
        run: |
          ALB_URL=$(terraform output -raw alb_url)
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "alb_url=${ALB_URL}"       >> $GITHUB_OUTPUT
          echo "cluster_name=${CLUSTER}"  >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}"  >> $GITHUB_OUTPUT

  update-service-staging:
    needs: [deploy-tf-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment ECS staging
        run: |
          aws ecs update-service \
            --cluster "${{ needs.deploy-tf-staging.outputs.cluster_name_staging }}" \
            --service "${{ needs.deploy-tf-staging.outputs.service_name_staging }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "${{ needs.deploy-tf-staging.outputs.cluster_name_staging }}" \
            --services "${{ needs.deploy-tf-staging.outputs.service_name_staging }}" \
            --region ${{ env.AWS_REGION }}

  test-staging:
    needs: [update-service-staging, deploy-tf-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E against Staging
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy-tf-staging.outputs.alb_url_staging }}
        run: |
          echo "Running acceptance tests against: $CYPRESS_BASE_URL"
          sleep 30
          npm run test:e2e --workspace e2e
