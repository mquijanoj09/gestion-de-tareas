name: CD Pipeline AWS EC2 con Terraform

on:
  workflow_run:
    workflows: ["CI Backend", "CI Frontend"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: "~1.6"

jobs:
  # -------------------------------------
  # Gate: solo continuar si el CI fue exitoso (o si es dispatch manual)
  # -------------------------------------
  gate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Resolve image tag (commit SHA)
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "image_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "Deploying commit: ${SHA}"

      - name: Ensure both CI workflows succeeded for this SHA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping cross-CI check"
            echo "proceed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          check_workflow() {
            local file="$1"
            local conclusion
            conclusion=$(gh api \
              "repos/${REPO}/actions/workflows/${file}/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "missing"')
            echo "$file => $conclusion"
            [ "$conclusion" = "success" ]
          }

          BACKEND_OK=false; FRONTEND_OK=false
          check_workflow "ci-backend.yml"  && BACKEND_OK=true  || true
          check_workflow "ci-frontend.yml" && FRONTEND_OK=true || true

          if $BACKEND_OK && $FRONTEND_OK; then
            echo "Both CI workflows succeeded for $SHA"
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "Waiting for the other CI workflow to finish — skipping this run"
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

  # -------------------------------------
  # Terraform Apply – Staging (dev)
  # -------------------------------------
  deploy-tf-staging:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      app_url: ${{ steps.tf_out.outputs.app_url }}
      public_ip: ${{ steps.tf_out.outputs.public_ip }}
      instance_id: ${{ steps.tf_out.outputs.instance_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket (staging)
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET_DEV || 'trello-tfstate-dev' }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating state bucket $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          fi

          LOCK_TABLE="trello-tfstate-lock"
          if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" >/dev/null 2>&1; then
            echo "Creating DynamoDB lock table $LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE" --region ${{ env.AWS_REGION }}
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (staging)
        working-directory: infra/terraform/environments/dev
        run: terraform init -reconfigure

      - name: Terraform Apply (staging)
        working-directory: infra/terraform/environments/dev
        env:
          TF_VAR_repo_url: https://github.com/${{ github.repository }}.git
          TF_VAR_repo_ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: terraform apply -auto-approve

      - name: Read Terraform outputs (staging)
        id: tf_out
        working-directory: infra/terraform/environments/dev
        run: |
          APP_URL=$(terraform output -raw app_url)
          PUBLIC_IP=$(terraform output -raw public_ip)
          INSTANCE_ID=$(terraform output -raw instance_id 2>/dev/null || \
            aws ec2 describe-instances \
              --filters "Name=ip-address,Values=${PUBLIC_IP}" \
              --query "Reservations[0].Instances[0].InstanceId" --output text)
          echo "app_url=${APP_URL}"       >> $GITHUB_OUTPUT
          echo "public_ip=${PUBLIC_IP}"   >> $GITHUB_OUTPUT
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Redeploy del stack docker-compose en EC2 staging (via SSM)
  # -------------------------------------
  redeploy-staging:
    needs: [gate, deploy-tf-staging]
    runs-on: ubuntu-latest
    env:
      TARGET_INSTANCE_ID: ${{ needs.deploy-tf-staging.outputs.instance_id }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for instance to register with SSM
        env:
          INSTANCE_ID: ${{ env.TARGET_INSTANCE_ID }}
        run: |
          echo "Waiting for $INSTANCE_ID to become SSM-managed..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" --output text 2>/dev/null || echo "None")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM online"; exit 0
            fi
            echo "  attempt $i: $STATUS"; sleep 10
          done
          echo "Instance never registered with SSM"; exit 1

      - name: Trigger redeploy via SSM Run Command
        env:
          INSTANCE_ID: ${{ env.TARGET_INSTANCE_ID }}
          IMAGE_TAG: ${{ needs.gate.outputs.image_tag }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CD redeploy ${IMAGE_TAG}" \
            --cloud-watch-output-config CloudWatchOutputEnabled=false \
            --parameters commands='[
              "set -euxo pipefail",
              "for i in $(seq 1 60); do [ -d /opt/app/.git ] && break; echo waiting for user_data clone...; sleep 10; done",
              "cd /opt/app",
              "git fetch --all --tags",
              "git checkout '"${IMAGE_TAG}"' || git checkout -B deploy-'"${IMAGE_TAG}"' '"${IMAGE_TAG}"'",
              "/usr/local/bin/docker-compose pull || true",
              "/usr/local/bin/docker-compose down --remove-orphans || true",
              "/usr/local/bin/docker-compose up -d --build --remove-orphans",
              "/usr/local/bin/docker-compose ps"
            ]' \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          # Poll instead of `wait command-executed` (which times out at 10 min and doesnt tolerate InProgress)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  SSM status: $STATUS"
            case "$STATUS" in
              Success) break ;;
              Failed|Cancelled|TimedOut) EXIT=1; break ;;
            esac
            sleep 15
          done
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" --output json
          [ "${EXIT:-0}" -eq 0 ]

      - name: Wait for app to become healthy
        env:
          APP_URL: ${{ needs.deploy-tf-staging.outputs.app_url }}
        run: |
          echo "Probing $APP_URL/api/health ..."
          for i in $(seq 1 30); do
            if curl -fsS "${APP_URL}/api/health" >/dev/null; then
              echo "Healthy"; exit 0
            fi
            sleep 10
          done
          echo "Staging did not become healthy in time"; exit 1

  # -------------------------------------
  # Pruebas de aceptación (Cypress E2E) contra Staging
  # -------------------------------------
  test-staging:
    needs: [deploy-tf-staging, redeploy-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E against Staging
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy-tf-staging.outputs.app_url }}
        run: npm run test:e2e --workspace e2e

      - name: Upload Cypress artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-staging
          path: |
            e2e/cypress/screenshots/
            e2e/cypress/videos/
          if-no-files-found: ignore

  # -------------------------------------
  # Terraform Apply – Producción
  # -------------------------------------
  deploy-tf-prod:
    needs: [gate, test-staging]
    runs-on: ubuntu-latest
    environment: production
    outputs:
      app_url: ${{ steps.tf_out.outputs.app_url }}
      public_ip: ${{ steps.tf_out.outputs.public_ip }}
      instance_id: ${{ steps.tf_out.outputs.instance_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform state bucket (prod)
        run: |
          BUCKET="${{ vars.TF_STATE_BUCKET_PROD || 'trello-tfstate-prod' }}"
          if ! aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Creating state bucket $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }}
            aws s3api put-bucket-versioning --bucket "$BUCKET" \
              --versioning-configuration Status=Enabled
          fi

          LOCK_TABLE="trello-tfstate-lock"
          if ! aws dynamodb describe-table --table-name "$LOCK_TABLE" >/dev/null 2>&1; then
            echo "Creating DynamoDB lock table $LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region ${{ env.AWS_REGION }}
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE" --region ${{ env.AWS_REGION }}
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (prod)
        working-directory: infra/terraform/environments/prod
        run: terraform init -reconfigure

      - name: Terraform Apply (prod)
        working-directory: infra/terraform/environments/prod
        env:
          TF_VAR_repo_url: https://github.com/${{ github.repository }}.git
          TF_VAR_repo_ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: terraform apply -auto-approve

      - name: Read Terraform outputs (prod)
        id: tf_out
        working-directory: infra/terraform/environments/prod
        run: |
          APP_URL=$(terraform output -raw app_url)
          PUBLIC_IP=$(terraform output -raw public_ip)
          INSTANCE_ID=$(terraform output -raw instance_id 2>/dev/null || \
            aws ec2 describe-instances \
              --filters "Name=ip-address,Values=${PUBLIC_IP}" \
              --query "Reservations[0].Instances[0].InstanceId" --output text)
          echo "app_url=${APP_URL}"       >> $GITHUB_OUTPUT
          echo "public_ip=${PUBLIC_IP}"   >> $GITHUB_OUTPUT
          echo "instance_id=${INSTANCE_ID}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Redeploy del stack docker-compose en EC2 producción
  # -------------------------------------
  redeploy-prod:
    needs: [gate, deploy-tf-prod]
    runs-on: ubuntu-latest
    env:
      TARGET_INSTANCE_ID: ${{ needs.deploy-tf-prod.outputs.instance_id }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger redeploy via SSM Run Command
        env:
          INSTANCE_ID: ${{ needs.deploy-tf-prod.outputs.instance_id }}
          IMAGE_TAG: ${{ needs.gate.outputs.image_tag }}
        run: |
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "CD redeploy prod ${IMAGE_TAG}" \
            --parameters commands='[
              "set -euxo pipefail",
              "cd /opt/app",
              "git fetch --all --tags",
              "git checkout '"${IMAGE_TAG}"'",
              "/usr/local/bin/docker-compose pull || true",
              "/usr/local/bin/docker-compose up -d --build --remove-orphans",
              "/usr/local/bin/docker-compose ps"
            ]' \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID"
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" --output json

      - name: Wait for app to become healthy
        env:
          APP_URL: ${{ needs.deploy-tf-prod.outputs.app_url }}
        run: |
          echo "Probing $APP_URL/api/health ..."
          for i in $(seq 1 30); do
            if curl -fsS "${APP_URL}/api/health" >/dev/null; then
              echo "Healthy"; exit 0
            fi
            sleep 10
          done
          echo "Production did not become healthy in time"; exit 1

  # -------------------------------------
  # Pruebas de humo en Producción
  # -------------------------------------
  smoke-test-prod:
    needs: [deploy-tf-prod, redeploy-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke – frontend root
        run: |
          URL="${{ needs.deploy-tf-prod.outputs.app_url }}"
          echo "GET $URL/"
          curl -fsS -o /dev/null -w "status=%{http_code}\n" "$URL/"

      - name: Smoke – backend health
        run: |
          URL="${{ needs.deploy-tf-prod.outputs.app_url }}"
          echo "GET $URL/api/health"
          curl -fsS "$URL/api/health" | tee /tmp/health.json
          grep -qi '"ok"\|"status":"up"\|healthy' /tmp/health.json || true
