name: CD Pipeline AWS ECS con Terraform

on:
  workflow_run:
    workflows: ['CI Backend', 'CI Frontend']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '~1.6'

jobs:
  # -------------------------------------
  # Gate: sólo continuar si ambos CI succedieron para el mismo SHA
  # -------------------------------------
  gate:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Resolve image tag (commit SHA)
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "image_tag=${SHA}" >> $GITHUB_OUTPUT
          echo "Deploying commit: ${SHA}"

      - name: Ensure both CI workflows succeeded for this SHA
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT; exit 0
          fi
          check_wf() {
            gh api "repos/${REPO}/actions/workflows/$1/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0].conclusion // "missing"'
          }
          B=$(check_wf ci-backend.yml)
          F=$(check_wf ci-frontend.yml)
          echo "backend=$B frontend=$F"
          if [ "$B" = "success" ] && [ "$F" = "success" ]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
          fi

  # -------------------------------------
  # Terraform Apply Staging
  # -------------------------------------
  deploy-tf-staging:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      alb_url_staging: ${{ steps.tf_out.outputs.alb_url }}
      cluster_name_staging: ${{ steps.tf_out.outputs.cluster_name }}
      service_name_staging: ${{ steps.tf_out.outputs.service_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform State Bucket
        run: |
          if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
            echo "Error: define la variable TF_STATE_BUCKET"; exit 1
          fi
          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
            echo "Bucket ya existe"
          else
            aws s3api create-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" --region ${{ env.AWS_REGION }}
          fi
          aws s3api put-bucket-versioning \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (staging)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=staging/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (staging)
        working-directory: infra/ecs
        env:
          TF_VAR_environment_name: staging
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:latest"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:latest"
          echo "Backend  image: $BACKEND_URI"
          echo "Frontend image: $FRONTEND_URI"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Get Terraform Outputs (staging)
        id: tf_out
        working-directory: infra/ecs
        run: |
          ALB_URL=$(terraform output -raw alb_url)
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "alb_url=${ALB_URL}"       >> $GITHUB_OUTPUT
          echo "cluster_name=${CLUSTER}"  >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}"  >> $GITHUB_OUTPUT

  # -------------------------------------
  # Forzar nuevo deployment del servicio staging
  # -------------------------------------
  update-service-staging:
    needs: [gate, deploy-tf-staging]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment ECS staging
        run: |
          aws ecs update-service \
            --cluster "${{ needs.deploy-tf-staging.outputs.cluster_name_staging }}" \
            --service "${{ needs.deploy-tf-staging.outputs.service_name_staging }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "${{ needs.deploy-tf-staging.outputs.cluster_name_staging }}" \
            --services "${{ needs.deploy-tf-staging.outputs.service_name_staging }}" \
            --region ${{ env.AWS_REGION }}

  # -------------------------------------
  # Pruebas de aceptación en Staging (Cypress)
  # -------------------------------------
  test-staging:
    needs: [update-service-staging, deploy-tf-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E against Staging
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy-tf-staging.outputs.alb_url_staging }}
        run: |
          echo "Running acceptance tests against: $CYPRESS_BASE_URL"
          sleep 30
          npm run test:e2e --workspace e2e

  # -------------------------------------
  # Terraform Apply Producción
  # -------------------------------------
  deploy-tf-prod:
    needs: [gate, test-staging]
    runs-on: ubuntu-latest
    outputs:
      alb_url_prod: ${{ steps.tf_out.outputs.alb_url }}
      cluster_name_prod: ${{ steps.tf_out.outputs.cluster_name }}
      service_name_prod: ${{ steps.tf_out.outputs.service_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Terraform State Bucket
        run: |
          if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
            echo "Bucket ya existe"
          else
            aws s3api create-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" --region ${{ env.AWS_REGION }}
          fi
          aws s3api put-bucket-versioning \
            --bucket "${{ vars.TF_STATE_BUCKET }}" \
            --versioning-configuration Status=Enabled

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (production)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply (production)
        working-directory: infra/ecs
        env:
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:latest"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:latest"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Get Terraform Outputs (production)
        id: tf_out
        working-directory: infra/ecs
        run: |
          ALB_URL=$(terraform output -raw alb_url)
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "alb_url=${ALB_URL}"       >> $GITHUB_OUTPUT
          echo "cluster_name=${CLUSTER}"  >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}"  >> $GITHUB_OUTPUT

  # -------------------------------------
  # Forzar nuevo deployment del servicio prod
  # -------------------------------------
  update-service-prod:
    needs: [gate, deploy-tf-prod]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment ECS production
        run: |
          aws ecs update-service \
            --cluster "${{ needs.deploy-tf-prod.outputs.cluster_name_prod }}" \
            --service "${{ needs.deploy-tf-prod.outputs.service_name_prod }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "${{ needs.deploy-tf-prod.outputs.cluster_name_prod }}" \
            --services "${{ needs.deploy-tf-prod.outputs.service_name_prod }}" \
            --region ${{ env.AWS_REGION }}

  # -------------------------------------
  # Smoke tests en Producción
  # -------------------------------------
  smoke-test-prod:
    needs: [update-service-prod, deploy-tf-prod]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Resolve image tag being deployed
        id: tag
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "image_tag=${SHA}" >> $GITHUB_OUTPUT

      - name: Smoke – frontend root
        run: |
          URL="${{ needs.deploy-tf-prod.outputs.alb_url_prod }}"
          echo "GET $URL/"
          sleep 30
          curl -fsS -o /dev/null -w "status=%{http_code}\n" "$URL/"

      - name: Smoke – backend health
        run: |
          URL="${{ needs.deploy-tf-prod.outputs.alb_url_prod }}"
          echo "GET $URL/api/health"
          curl -fsS "$URL/api/health"

  # -------------------------------------
  # Automatic Rollback on Smoke Test Failure
  # -------------------------------------
  auto-rollback:
    needs: [deploy-tf-prod, smoke-test-prod]
    if: failure() && needs.smoke-test-prod.outputs.image_tag != ''
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.find_previous.outputs.previous_tag }}
    steps:
      - name: Find previous stable version
        id: find_previous
        env:
          CURRENT_SHA: ${{ needs.smoke-test-prod.outputs.image_tag }}
        run: |
          # Get the previous stable tag (not the current one)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "latest")
          echo "previous_tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
          echo "Current deployment failed: $CURRENT_SHA"
          echo "Will rollback to: $PREVIOUS_TAG"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init (production)
        working-directory: infra/ecs
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Get current infrastructure
        id: current
        working-directory: infra/ecs
        run: |
          CLUSTER=$(terraform output -raw ecs_cluster_name)
          SERVICE=$(terraform output -raw ecs_service_name)
          echo "cluster_name=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "service_name=${SERVICE}" >> $GITHUB_OUTPUT

      - name: Rollback Production to previous version
        working-directory: infra/ecs
        env:
          IMAGE_TAG: ${{ steps.find_previous.outputs.previous_tag }}
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-backend:${IMAGE_TAG}"
          FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/gestion-de-tareas-frontend:${IMAGE_TAG}"

          echo "🔴 AUTO-ROLLBACK: Smoke tests failed!"
          echo "Rolling back PRODUCTION to: $IMAGE_TAG"
          echo "Backend image: $BACKEND_URI"
          echo "Frontend image: $FRONTEND_URI"

          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${BACKEND_URI}" \
            -var="frontend_image_uri=${FRONTEND_URI}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Force new deployment ECS production
        run: |
          aws ecs update-service \
            --cluster "${{ steps.current.outputs.cluster_name }}" \
            --service "${{ steps.current.outputs.service_name }}" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster "${{ steps.current.outputs.cluster_name }}" \
            --services "${{ steps.current.outputs.service_name }}" \
            --region ${{ env.AWS_REGION }}

      - name: Notify rollback
        run: |
          echo "## 🔴 Automatic Rollback Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** Smoke tests failed after production deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Rolled back to:** ${{ steps.find_previous.outputs.previous_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Manual verification required!**" >> $GITHUB_STEP_SUMMARY
